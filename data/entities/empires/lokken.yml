lore: |-
  科学进步是洛克人的核心。洛克人天生勤奋、喜好观察，从母星高原的爬行动物群落进化到技术至上的高效社群，最注重效率、严谨和科学原则。

  最引人注目的恐怕是他们早就提出并研究的机械自动化概念：在洛库尔的第一个科学家离开星球轨道之前，他们就早早发明了真正意义上的机器人。
