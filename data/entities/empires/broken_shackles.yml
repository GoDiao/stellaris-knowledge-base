lore: |-
  收债人来的时候，小那提拉还不到16个标准岁。她家徒四壁，所在的整个星球也是一贫如洗。她被卖为奴隶，遭受了难以想象的苦难。然而她的意志是坚不可摧的，当机会终于来临时，她抓住了。

  她在这艘运奴船上发动了一场兵变，带领坠落后的幸存者们熬过了开头的的艰难岁月。是她的力量将自由降地的人民团结在一起，她的智慧将击碎的锁链锻造成一个国家。

  如今，自由民降临国已踌躇满志准备好返回星空，他们深知，自己的命运只掌握在彼此的手中。
