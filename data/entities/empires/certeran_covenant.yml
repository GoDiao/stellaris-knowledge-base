lore: |-
  据信，当一位瑟特兰离世时，其精华会通过一道通往星界位面的星门返回。他们也由此到达来世，但来世所采取的形式仍是一个谜。人们在一套严格的道德标准的控制下坚定着这一信仰，每一位虔诚的瑟特兰都不想在虚无中永恒漂泊。

  他们最勇敢的探索者们正在寻找时空的裂隙，以期能回答他们社会的终极问题：死后究竟会去往哪里？
