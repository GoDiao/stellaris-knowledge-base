lore: |-
  A diet rich in vegetables and a kleptoplastic mutation eventually gifted these mammals with an unusual ability: photosynthesis. Unburdened by hunger, the Homines Plantae evolved as placid, plantlike primates who would favor sunbathing over hunting.

  Their civilization developed without hurry, technological advancements balanced against the need to preserve their environment. They eventually developed FTL technology, slow and steady like trees raising their branches to the sky. Now they're ready to spread their blooms all over the galaxy, roots firmly planted on their homeworld of Gaea.
