id: orbis
name:
  en: 0 "Orbis Customer Synergies"
  zh: 奥比斯客户协同社
category: empire
subcategory: prescripted
dlc: MegaCorp
lore: |-
  奥比斯客户协同社的故事就是塞拉菲斯主星的故事。它也是所有奥比斯人的故事，同时也可以成为你的故事。起初只是一家不起眼的视觉植入物公司，奥比斯客户协同社逐渐将其一流的产品，以及以客户为中心的策略带入许多其它市场，以满足奥比斯人一生中的各种需求。

  在数个世纪的积极游说之后，奥比斯客户协同社终于成功地克服了塞拉菲斯主星立法机构的繁文缛节。自从公司发展不再受到条例限制之后，奥比斯客户协同社兼并了数家信息科技公司，迅速成为了星球上最大的新闻、数据与娱乐供应商。

  身为塞拉菲斯主星最大的全球通讯服务商，朝向全面政治管理的这一步对我们来说都是一个激动人心的机会。奥比斯客户协同社。前途无量。
