    type: country_event
    options: []
  - id: crisis.1112
    name:
      en: The Aberrant
      zh: 背道者
    desc:
      en: The ships that have been emerging from the second wormhole are very similar to the ones that came from the first, but there are several subtle differences between them. Furthermore, early reports indicate that ships belonging to these new invaders have clashed with those of the first group!\n\nWe have intercepted a powerful signal emanating from the second wormhole.
      zh: 从第二个虫洞中出来的飞船和之前的非常相似，但仍然有几处细微的不同。据报告称，这些新来的飞船竟和之前的入侵者打起来了！我们也从第二个虫洞处截获了强大的信号。
    type: country_event
    options:
      - en: Put it on.
        zh: 放出来听听。
