  - id: crisis.1010
    name:
      en: Intercepted Transmission
      zh: 截获的信号
    desc:
      en: ...feeding ground reached... prey bountiful... at long last... we shall feast...
      zh: ……到达觅食区域……猎物很多……终于……可以大吃一顿……
    type: country_event
    options:
      - en: What are these things?
        zh: 这些东西到底是什么？
  - id: crisis.1011
    name:
      en: '[Root.GetName] Lost'
      zh: '[Root.GetName]殖民地被毁'
    desc:
      en: We have lost our colony on [Root.GetName]! After taking up positions in orbit, the extradimensional invaders bombarded the surface and feasted on all life forms below. The [Root.GetPlanetMoon]'s entire biosphere was consumed by the creatures - not a single trace of anything living remains.
      zh: 我们失去了[Root.GetName]殖民地！这些来自异次元的侵略者先是摧毁了轨道空间站，而后对着星球表面狂轰滥炸，收割了地表上的所有生命。[Root.GetPlanetMoon]的整个生物圈都被毁灭殆尽——连一点生命的痕迹都没有了。
    type: planet_event
    options:
      - en: Those monsters must be stopped!
        zh: 不惜一切代价阻止那些怪物！
