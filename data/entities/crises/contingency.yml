  - id: crisis.1008
    name:
      en: Galactic Power Surge
      zh: 星系能源波动
    desc:
      en: Instruments across the [Root.GetName] have suddenly picked up a subspace power surge of massive proportions coming from somewhere within our galaxy. Our scientists are struggling to come up with an explanation for this event - nothing of its like has ever been recorded.\n\nThe exact origin point of this sudden power surge has yet to be identified, but we are still in the process of analyzing the available data.
      zh: '[Root.GetName]中所有仪器突然全数感应到了巨大的亚空间能源波动，其源头就在我们星系之中。我们的科学家也难以解释其中原因——这种奇异现象可是前所未见。源头的具体位置尚不明确，我们仍在继续分析现有数据。'
    type: country_event
    options:
      - en: Keep at it.
        zh: 继续调查。
