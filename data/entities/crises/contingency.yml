  - id: crisis.1110
    name:
      en: A Second Portal
      zh: 第二道传送门
    desc:
      en: Our instruments have detected a new subspace power surge, this time coming from the [second_portal_system.GetName] system! A second massive wormhole has appeared, and its energy signature appears to be almost identical to that of the first dimensional rift which opened in our galaxy.\n\nIt looks like the mysterious invaders have opened a second gateway to their realm through which they can send even more reinforcements.
      zh: 我方仪器又侦测到了新的亚空间能源波，这次的源头位于[second_portal_system.GetName]星系！那里又出现了一个巨大的虫洞，从能源特征来看，这与我们星系中出现的传送门十分相似。看来入侵者打开了第二个通向他们界域的传送门，想要搬运来更多的援军。
    type: country_event
    options:
      - en: This has gone from bad to worse.
        zh: 事态变得更糟了。
  - id: crisis.1112
    name:
      en: null
