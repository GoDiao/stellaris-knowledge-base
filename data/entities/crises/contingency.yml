  - id: crisis.1013
    name:
      en: Dimensional Portal Destroyed
      zh: 异次元传送门被摧毁
    desc:
      en: The dimensional portal in the [extradimensional_system.GetName] system has been destroyed! This means that the extradimensional invaders can no longer receive reinforcements from their twisted realm.\n\nWith the destruction of this portal, the end of these invasions is finally in sight. A profound sense of elation has settled over most of the galaxy. The [portal_killer.GetName] has won much admiration, since it was their ships that struck the final blow against the portal. The crews of those vessels will be celebrated as heroes for generations to come.
      zh: 位于[extradimensional_system.GetName]星系的高维传送门已经被摧毁了！这些可恶的高维入侵者没法再叫来援兵了。摧毁了传送门后，这场战争终于迎来了胜利的曙光。星系中的广大民众都在欢呼雀跃。同时，[portal_killer.GetName]也倍受称赞，因为他们的飞船给了传送门最后一击。他们的英雄事迹将被代代传颂。
    type: country_event
    options:
      - en: The galaxy is a safer place.
        zh: 星系更加安全了
  - id: crisis.1016
    name:
      en: First Portal Destroyed
      zh: 第一传送门已摧毁
    desc:
      en: The initial breaching point that was used by the extradimensionals to invade our galaxy has been destroyed.\n\n$crisis.1116.not_last_portal$
      zh: |-
        异次元入侵者最初的入侵点已经被摧毁了。

        $crisis.1116.not_last_portal$
    type: country_event
    options:
      - en: We must not relent.
        zh: 绝不心慈手软。
  - id: crisis.1050
    name:
      en: Incoming Transmission
      zh: 信号传输接入
    desc:
      en: "{\r"
      zh: "{\r"
    type: country_event
    options:
      - en: View screen off.
        zh: 显示屏关闭。
      - en: Can there be peace between us?
        zh: 我们之间难道不可以和平相处吗？
      - en: You picked the wrong dimension to invade.
        zh: 你们会后悔来到这个次元的。
      - en: You are just another type of wretched xeno.
        zh: 你们这些外星物种真是恶心。
      - en: Tell us about yourselves. Help us understand you.
        zh: 介绍一下你们。让我们互相了解一下吧。
      - en: Do you come from a higher plane of existence?
        zh: 你们来自某个存在的更高位面吗？
      - en: Are you from the Shroud?
        zh: 你们是从虚境来的吗？
      - en: View screen off.
        zh: 显示屏关闭。
