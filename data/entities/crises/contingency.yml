  - id: crisis.1271
    name:
      en: Invasion Defeated
      zh: 击退入侵
    desc:
      en: The last vestiges of the extradimensional invaders have been wiped out, hopefully ridding the galaxy of this threat for good.\n\nSapients everywhere are celebrating the news of this great victory, safe at last in the knowledge that they won't be harvested as food by these strange energy creatures after all. Perhaps this is the beginning of a new era of galactic cooperation and friendship?
      zh: 最后残存的高维入侵者也已被彻底消灭，希望我们这回算是一劳永逸地消除了这些家伙对宇宙的威胁。全宇宙的智能生物都在庆祝这一伟大的胜利，在得知不必再惧怕成为他们盘中之餐的消息后，所有人都松了一口气。也许，这会成为宇宙新一轮全面合作与友谊的开端呢？
    type: country_event
    options:
      - en: Our spiritual armor has weathered yet another storm.
        zh: 我们的精神又经历了一次严峻的考验。
      - en: One day, perhaps we will be the ones invading their realm.
        zh: 某一天，也许会轮到我们来入侵他们的世界吧。
      - en: Unfortunate that we had no opportunity to study their dimension.
        zh: 可惜，并没有机会研究他们的次元。
      - en: If only there had been a way to peacefully co-exist with them.
        zh: 多希望能和他们和平共处啊。
      - en: The galactic economy should make a swift recovery.
        zh: 宇宙经济应该很快就会恢复元气的。
      - en: We shall see.
        zh: 这还有待观察。
      - en: Those creatures made a mistake when they invaded our dimension.
        zh: 这些可悲的生物选错了对手。
      - en: They were a fascinating, if dangerous, form of life.
        zh: 可惜他们的侵略性太强。我们本可以互相学习借鉴的。
