  - id: crisis.1009
    name:
      en: The Unbidden
      zh: 破界者
    desc:
      en: The source of the massive power surge we detected earlier has been identified. It comes from some kind of gigantic subspace tear in the [extradimensional_system.GetName] system. Fleets of strange spacecraft are pouring out of this dimensional portal, and early reports speak of indiscriminate attacks against everyone coming into contact with them.\n\nWe have intercepted a powerful signal being sent from the arriving vessels to somewhere on the other side of the portal. It sounds like... a hunting call.
      zh: |-
        我们已经对之前检测到的巨大能源波完成了甄别。它来源于[extradimensional_system.GetName]星系中一个巨大的亚空间裂缝。奇怪的飞船从传送门中蜂拥而出，初步报告显示，这些飞船会对接触到的任何事物发动无差别的攻击。

        我方截获了这些飞船发往传送门另一边的一段高能信号。听起来……像是狩猎的哨音一样。
    type: country_event
    options:
      - en: Spirits protect us...
        zh: 愿众神保佑我们……
      - en: Brief all fleet commanders.
        zh: 将消息传达给所有舰队指挥官。
      - en: These creatures must be studied closer.
        zh: 必须近距离研究这些生物。
      - en: Are we sure they can't be reasoned with?
        zh: 真的无法与他们进行理论吗？
      - en: This will cut into our profit margins...
        zh: 这将损害我们的利润……
      - en: Dark days lie ahead.
        zh: 黑暗即将来临。
      - en: These wretched xenos will be purged.
        zh: 可恶的外星生物，一定要把它们统统干掉。
      - en: Fascinating... life from another dimension.
        zh: 真有意思……来自高维的生命体。
      - en: They seem well organized.
        zh: 他们看起来组织有序。
      - en: This is a threat to all sapient life.
        zh: 这对任何有感知的生物来说都是个威胁。
      - en: Fascinating... alien life from beyond our galaxy.
        zh: 真是令人着迷……系外的生命体。
