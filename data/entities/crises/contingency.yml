  - id: crisis.1250
    name:
      en: The Warlock
      zh: 术士
    desc:
      en: When the swirling energies left behind after the destruction of the last dimensional portal finally dissipated, our forces found a weakened extradimensional drifting nearby. The creature was captured and interrogated.\n\nIt is apparently one of their "§HWarlocks§!" - a powerful extradimensional even by their standards, responsible for maintaining the portal's link between our reality and theirs. If we can study or even channel its psionic power, we should be able to greatly improve our sublight speeds and jump drive range.
      zh: |-
        当最后一个维度传送门被摧毁后留下的能量旋涡最终消散时，我们的部队发现附近有一个虚弱的异次元体在飘荡。我们捕获了这个生物并进行了审讯。

        这显然是它们的一个“§H术士§!”，即便是以它们的标准来评判，它也是一位强大的异次元体。它负责维持我们和他们的现实之间的传送门。如果我们能够研究或者引用它的灵能，我们应该能够极大的提高我们的亚光速航速和跃迁引擎的跃迁范围。
    type: country_event
    options:
      - en: Good.
        zh: 好。
