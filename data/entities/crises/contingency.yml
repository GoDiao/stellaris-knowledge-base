  - id: crisis.1113
    name:
      en: Incoming Transmission
      zh: 信号传输接入
    desc:
      en: ...shabanash... so this is where you ran... this realm will offer you no shelter... we shall deal with you, and then claim this feeding ground for ourselves...
      zh: ……原来你们…逃到了这里……休想……躲到……这个次元……我们会干掉你们，占据觅食区……
    type: country_event
    options:
      - en: View screen off.
        zh: 显示屏关闭。
