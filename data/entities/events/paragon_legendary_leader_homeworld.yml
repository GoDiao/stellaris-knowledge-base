dlc: Paragon
lore: |-
  那些无人机所保护的是一颗被潮汐锁定的行星，一面向着夜空的黑暗与严寒，另一面则沐浴着永恒的光明。在温暖的昼半球，我们发现了一座可能曾是瓦格罗人城市的废墟。

  §Y凯德斯§!相信，他过往的细节可能就深埋于此，并且希望在这里的发现能够揭示这颗行星的历史。

  §R这个遗址必须由§Y凯德斯§!亲自挖掘。§!
