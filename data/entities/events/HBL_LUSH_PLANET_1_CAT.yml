          OR:
            has_star_flag:
              - com_sol
              - nuked_sol
        any_country:
          OR:
            has_country_flag:
              - human_1
              - humans_early_space_age
    FROM:
      owner:
        NOT:
          has_country_flag:
            - found_voyager
            - found_pioneer
