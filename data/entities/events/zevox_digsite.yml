  一艘我们的飞船在探索[Root.solar_system.GetName]恒星系的时候偶然在位于[Root.Planet.GetName][Root.Planet.Orbit.GetName]的卫星上发现了一艘坠毁的小型飞船。

  这艘飞船上的标志与符号我们从未见过。些许样本已经被提取并用于进一步研究，但飞船本身过大且不够牢固，无法移动，我们只能就地进行分析研究了。
