category: event
subcategory: anomaly
dlc: Distant Stars
lore: '[From.System.GetName]星系中有什么东西在损坏我们的探测器数据。这一异常现象的原因似乎是[From.GetName]星球。'
picture: GFX_evt_ship_in_orbit_2
level: 4
