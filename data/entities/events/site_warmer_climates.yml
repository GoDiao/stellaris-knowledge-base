lore: 从轨道中拍摄的[From.Planet.GetName]的影像清晰地展现了这个技术文明的基础设施。神秘的是，尽管庞大的城区被复杂的表面交通网络相连接，但这颗行星看起来似乎已完全废弃，没有任何尚存感性生物的迹象。此行星内核比大多数行星更活跃，但这里没有灾难性事件或其他任何足以直接解释这些人口失踪的原因的事件的迹象。他们都去哪里了呢？
