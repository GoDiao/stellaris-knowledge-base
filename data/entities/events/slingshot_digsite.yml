lore: 我们已经找到了一个损毁的巨型结构残骸。该构造显然亟需修复，同时我们也在其数据库中发现了饱含着有关异星生物的见解的宝贵财富。尽管我们还在决定是否要重建这一远古科技的造物，我们的考古学家有机会去发掘并取回这宇宙设备起源的线索。它的其中一个发明者，“量子建筑师”相关的日志似乎格外有价值。恢复这些文件对我们解密遗留给我们科技的远古种族的文化和历史必然有着莫大的帮助。
