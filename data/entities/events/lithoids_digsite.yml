id: lithoids_digsite
name:
  en: 0 "Whispers in the Stone"
  zh: 石中低语
category: event
subcategory: archaeological_site
dlc: Ancient Relics
lore: |-
  在[From.Planet.GetName]上的矿井的深处，是一个古老外星文明所遗留的痕迹。宏伟的装饰建筑和洞室告诉我们，一个有着丰富文化的文明已经能够巧妙地切割基岩和建设隧道系统，它们被厚实的闸门所保护，通往更加深入的山体之中。

  由于山体中富集的，以爆炸性闻名的甲烷气体，继续探索下去会很危险。
