id: site_zarqlan
name:
  en: 0 "Ancient Tomb"
  zh: 古墓
category: event
subcategory: archaeological_site
dlc: Ancient Relics
lore: |-
  在行星地表上，一些古老的建筑物被隐藏在某种隐形能量场之下。只是偶然有一颗小行星在撞击时，在该区域发生了偏转并被监控到，我们这才发现了它的存在。

  在该能量场被关闭后，考古学家们现在可以去探索原本隐藏其下的，令人生畏的巨大建筑群了。
